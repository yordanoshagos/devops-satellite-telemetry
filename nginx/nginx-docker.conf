server {
    listen 80;
    server_name _;
    server_tokens off;

    # Public access to Ground Station API only
    location / {
        proxy_pass http://ground-station-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Block direct access to internal services through Nginx
    location /telemetry-parser {
        return 403;
    }

    location /anomaly-detector {
        return 403;
    }

    # Health endpoint for Nginx itself
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
